# Weights & Biases Configuration for APAS-SB Training

# W&B Settings
wandb:
  project: "apas-sb"  # Your W&B project name
  entity: null  # Your W&B username or team (set to your username)
  tags:
    - "pearl"
    - "binding-affinity"
    - "multi-task"

# Data Configuration
data_root: "./data"
use_synthetic: false  # Use real datasets by default (--test forces synthetic)

# Real BindingDB dataset (eliminates synthetic binding-affinity data)
bindingdb:
  # Raw 8.8 GB dump (streamed once into the processed cache below).
  tsv_path: "/nfs/lambda_stor_01/data/avasan/APAS-SB/APAS-SB/data/bindingdb/BindingDB_All.tsv"
  # Compact preprocessed cache; built automatically if missing.
  processed_csv: "./data/bindingdb/bindingdb_processed.csv"
  # Cap kept rows (null = keep all). Useful to bound memory / iteration time.
  max_samples: 200000

# Featurization: real pretrained encoders for protein/ligand inputs.
#   mode: esm2_molformer -> ESM2 (protein) + MolFormer (ligand) per-token embeddings
#         hash           -> deterministic 64-d placeholder features (test/synthetic)
features:
  mode: esm2_molformer
  esm2_model: esm2_t33_650M_UR50D      # 1280-d; alt: esm2_t30_150M_UR50D (640-d), esm2_t6_8M_UR50D (320-d)
  molformer_model: ibm/MoLFormer-XL-both-10pct   # 768-d
  max_protein_len: 200                 # residues kept per protein (pad/truncate)
  max_ligand_len: 64                   # SMILES tokens kept per ligand
  emb_cache_dir: "./data/bindingdb/emb_cache"
  precompute: true                     # warm the embedding cache before training

# Model Configuration
model:
  hidden_dim: 512
  num_layers: 12
  num_heads: 8
  dropout: 0.1
  pair_dim: 128

# Training Phases (aligned with APAS-SB_Development_Roadmap.md)
training:
  # Phase 2A: Baseline Training (48 GPUs, 13 days)
  phase_2a:
    name: "baseline_training"
    gpus: 48
    duration_days: 13
    batch_size_per_gpu: 4
    gradient_accumulation_steps: 4
    effective_batch_size: 768
    num_epochs: 100
    learning_rate: 1.0e-4
    weight_decay: 0.01
    warmup_steps: 1000
    
    datasets:
      - pdbind
      - skempi2
      - brenda
      - proteingym
      - chembl
      - bindingdb
    
    loss_weights:
      binding_affinity: 1.0
      ddg: 1.0
      kcat: 0.5
      fitness: 0.5
  
  # Phase 2B: Multi-task Training (56 GPUs, 17 days)
  phase_2b:
    name: "multitask_training"
    gpus: 56
    duration_days: 17
    batch_size_per_gpu: 4
    gradient_accumulation_steps: 4
    effective_batch_size: 896
    num_epochs: 120
    learning_rate: 8.0e-5
    weight_decay: 0.01
    warmup_steps: 1500
    
    datasets:
      - pdbind
      - skempi2
      - brenda
      - proteingym
      - chembl
      - bindingdb
      - pubchem_hts
      - pubchem_small
      - cemm
      - midas
      - synthetic_decoys
    
    loss_weights:
      binding_affinity: 1.0
      ddg: 1.0
      kcat: 0.8
      fitness: 0.8
  
  # Phase 2C: Uncertainty-Aware Training (64 GPUs, 20 days)
  phase_2c:
    name: "uncertainty_aware_training"
    gpus: 64
    duration_days: 20
    batch_size_per_gpu: 4
    gradient_accumulation_steps: 4
    effective_batch_size: 1024
    num_epochs: 150
    learning_rate: 5.0e-5
    weight_decay: 0.01
    warmup_steps: 2000
    
    datasets:
      - pdbind
      - skempi2
      - brenda
      - proteingym
      - chembl
      - bindingdb
      - pubchem_hts
      - pubchem_small
      - cemm
      - midas
      - synthetic_decoys
      - mdcath
      - atlas
    
    loss_weights:
      binding_affinity: 1.0
      ddg: 1.0
      kcat: 1.0
      fitness: 1.0
      md_consistency: 0.5

# Optimization
max_grad_norm: 1.0
scheduler: "cosine"
min_learning_rate: 1.0e-6

# Logging
log_interval: 10  # Log every N batches
checkpoint_interval: 10  # Save checkpoint every N epochs
checkpoint_dir: "./checkpoints"

# System
num_workers: 4
pin_memory: true
mixed_precision: true  # Use BF16 on H100 GPUs

# Validation
val_interval: 5  # Validate every N epochs
val_batch_size: 8

