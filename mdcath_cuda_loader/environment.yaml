# CUDA 11.8 / V100 (sm_70) environment for the mdCATH streaming loader.
# PyTorch cu118 wheels ship their own CUDA runtime; only the NVIDIA driver is
# needed on the host. torch_geometric is required (upstream MDCATH extends it).
name: mdcath
channels:
  - conda-forge
dependencies:
  - python=3.10
  - numpy
  - h5py            # conda-forge build links a working HDF5 (needed for range reads)
  - tqdm
  - pip
  - pip:
      - torch==2.0.1+cu118
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - torch_geometric>=2.4
      - huggingface_hub>=0.23   # provides HfFileSystem for streamed range reads
      - fsspec
